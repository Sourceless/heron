name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeLaGuardo/setup-clj-kondo@v1
      - run: clj-kondo --lint src

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: DeLaGuardo/setup-clojure@13.5.3
        with:
          cli: latest
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('deps.edn') }}
          restore-keys: ${{ runner.os }}-maven-
      - run: clojure -M:nvd

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: DeLaGuardo/setup-clojure@13.5.3
        with:
          cli: latest
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('deps.edn') }}
          restore-keys: ${{ runner.os }}-maven-
      - name: Create .env
        run: |
          cat > .env <<'EOF'
          POSTGRES_USER=datomic
          POSTGRES_PASSWORD=datomic
          DATOMIC_SQL_USER=datomic
          DATOMIC_SQL_PASSWORD=datomic
          AWS_ACCESS_KEY_ID=test
          AWS_SECRET_ACCESS_KEY=test
          EOF
      - name: Start dev stack
        run: docker compose up -d --wait
      - name: Run tests
        run: clojure -M:test
